<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bruna Workspace</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23ED005E'/><circle cx='16' cy='13' r='5' fill='white'/><path d='M6 29c0-5.523 4.477-10 10-10s10 4.477 10 10' stroke='white' stroke-width='2.2' stroke-linecap='round' fill='none'/></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- ── Login ── -->
<div id="auth">
  <div class="acard">
    <div class="alogo">
      <div class="amark" style="display:flex;align-items:center;justify-content:center;background:#6366F1;border-radius:8px"><svg width="22" height="22" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="16" cy="13" r="6" fill="white"/><path d="M5 30c0-6.075 4.925-11 11-11s11 4.925 11 11" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg></div>
      <span class="alogo-text">Bruna Workspace</span>
    </div>
    <div class="atitle">Sign in</div>
    <div class="asub">Enter your credentials to continue</div>
    <div class="fwrap"><div class="flabel">Username</div><input class="finput" id="em" type="text" value="bruna" placeholder="username"/></div>
    <div class="fwrap"><div class="flabel">Password</div><input class="finput" id="pw" type="password" value="Bruna2026" placeholder="••••••••"/></div>
    <div class="aerr" id="err"></div>
    <button class="abtn" id="loginBtn">Sign in</button>
    <div class="demo-creds">
      <div class="demo-creds-label">Credentials</div>
      <div><strong>Username:</strong> bruna</div>
      <div><strong>Password:</strong> Bruna2026</div>
    </div>
  </div>
</div>

<!-- ── App shell ── -->
<div id="app">
  <div class="sbwrap">
    <div class="sb" id="sb">
      <div class="sbhead">
        <div class="lmark" style="display:flex;align-items:center;justify-content:center;background:#6366F1;border-radius:6px"><svg width="18" height="18" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="16" cy="13" r="6" fill="white"/><path d="M5 30c0-6.075 4.925-11 11-11s11 4.925 11 11" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg></div>
        <span class="lname">Bruna Workspace</span>
      </div>
      <nav class="sbnav" id="nav"></nav>
      <div class="sbfoot" id="userBox">
        <div class="avatar" id="av">CA</div>
        <div class="uinfo">
          <div class="uname" id="un">Admin</div>
          <div class="urole">Product Team</div>
        </div>
        <div class="logoutbtn" id="logoutBtn" title="Sign out">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M6 3H3v10h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 5l3 3-3 3M13 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
    </div>
    <div class="togbtn" id="tog">
      <svg id="togico" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M6 2L3 5l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <span class="tbadge" id="qbadge"></span>
    </div>
    <span id="pgname" style="display:none"></span>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<!-- App modules -->
<script src="js/icons.js"></script>
<script src="js/loader.js"></script>
<script src="js/csv-import.js"></script>
<script src="js/ai-insights.js"></script>
<script src="js/metadata-analysis.js"></script>
<script src="js/media-planner-v2.js"></script>
<script src="js/new-content-upload.js"></script>
<script src="js/taxonomy-explorer.js"></script>
<script src="js/media-planner.js"></script>
<script src="js/app.js"></script>
</body>
</html>
