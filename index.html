<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KERV One Demo</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23ED005E'/><text x='16' y='23' font-family='system-ui,sans-serif' font-size='20' font-weight='700' fill='white' text-anchor='middle'>K</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- ── Login ── -->
<div id="auth">
  <div class="acard">
    <div class="alogo">
      <div class="amark" style="display:flex;align-items:center;justify-content:center;background:var(--accent);border-radius:8px"><svg width="22" height="22" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="16" cy="13" r="6" fill="white"/><path d="M5 30c0-6.075 4.925-11 11-11s11 4.925 11 11" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg></div>
      <span class="alogo-text">KERV One Demo</span>
    </div>
    <div class="atitle">Sign in</div>
    <div class="asub">Enter your credentials to continue</div>
    <div class="fwrap"><div class="flabel">Username</div><input class="finput" id="em" type="text" value="bruna" placeholder="username"/></div>
    <div class="fwrap"><div class="flabel">Password</div><input class="finput" id="pw" type="password" value="Bruna2026" placeholder="••••••••"/></div>
    <div class="aerr" id="err"></div>
    <button class="abtn" id="loginBtn">Sign in</button>
    <div class="demo-creds">
      <div class="demo-creds-label">Credentials</div>
      <div><strong>Username:</strong> bruna</div>
      <div><strong>Password:</strong> Bruna2026</div>
    </div>
  </div>
</div>

<!-- ── App shell ── -->
<div id="app">
  <div class="sbwrap">
    <div class="sb" id="sb">
      <div class="sbhead">
        <img src="kerv-one-logo.svg" alt="KERV One" class="sblogo"/>
      </div>
      <nav class="sbnav" id="nav"></nav>
      <div class="sbfoot" id="userBox">
        <div class="avatar" id="av">CA</div>
        <div class="uinfo">
          <div class="uname" id="un">Admin</div>
          <div class="urole">Product Team</div>
        </div>
        <div class="logoutbtn" id="logoutBtn" title="Sign out">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M6 3H3v10h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 5l3 3-3 3M13 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
    </div>
    <div class="togbtn" id="tog">
      <svg id="togico" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M6 2L3 5l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="tb-left">

        <!-- Org selector -->
        <div class="tb-select-wrap" id="org-wrap">
          <button class="tb-select" id="orgBtn" onclick="toggleOrgDd(event)">
            <span class="tb-select-label">Org</span>
            <span class="tb-select-sep"></span>
            <span class="tb-select-val" id="orgVal">Paramount AUS</span>
            <svg class="tb-select-chevron" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="tb-select-dd" id="orgDd"></div>
        </div>

        <!-- Advertiser selector -->
        <div class="tb-select-wrap" id="adv-wrap">
          <button class="tb-select" id="advBtn" onclick="toggleAdvDd(event)">
            <span class="tb-select-label">Advertiser</span>
            <span class="tb-select-sep"></span>
            <span class="tb-select-val" id="advVal">Walmart</span>
            <svg class="tb-select-chevron" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="tb-select-dd" id="advDd"></div>
        </div>

      </div>
      <div class="tb-actions">

        <!-- Settings (includes WIP submenu) -->
        <div class="tb-btn-wrap" id="settings-wrap">
          <button class="tb-btn" id="settingsBtn" title="Settings" onclick="toggleSettingsMenu(event)">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
          <div class="tb-dropdown" id="settingsMenu">
            <div class="tb-dd-header">Settings</div>
            <div class="tb-dd-item" onclick="setPage('organization','Organization');closeMenus()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              <span>Organization</span>
            </div>

            <div class="tb-dd-divider"></div>

            <!-- WIP row — flyout to the left -->
            <div class="tb-dd-wip-wrap">
              <div class="tb-dd-item" onclick="toggleWipSubmenu(event)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                <span>Work in Progress</span>
                <svg class="tb-dd-chevron" id="wip-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4 2l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </div>
              <div class="tb-submenu" id="wipSubmenu">
                <div class="tb-dd-header">Work in Progress</div>
                <div class="tb-dd-item tb-dd-item--sub" onclick="setPage('sdt-content-form','New Content Upload');closeMenus()">
                  <span class="tb-dd-ico" id="wip-ico-0"></span>
                  <span>New Content Upload</span>
                </div>
                <div class="tb-dd-item tb-dd-item--sub" onclick="setPage('taxonomy-showcase','Taxonomy Explorer');closeMenus()">
                  <span class="tb-dd-ico" id="wip-ico-1"></span>
                  <span>Taxonomy Explorer</span>
                </div>
                <div class="tb-dd-item tb-dd-item--sub" onclick="setPage('media-planner','Media Planner (v1)');closeMenus()">
                  <span class="tb-dd-ico" id="wip-ico-2"></span>
                  <span>Media Planner (v1)</span>
                </div>
              </div>
            </div>

          </div>
        </div>

      </div>
    </div>
    <span id="pgname" style="display:none"></span>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<!-- App modules -->
<script src="js/icons.js"></script>
<script src="js/loader.js"></script>
<script src="js/csv-import.js"></script>
<script src="js/ai-insights.js"></script>
<script src="js/metadata-analysis.js"></script>
<script src="js/media-planner-v2.js"></script>
<script src="js/new-content-upload.js"></script>
<script src="js/taxonomy-explorer.js"></script>
<script src="js/media-planner.js"></script>
<script src="js/organization.js"></script>
<script src="js/app.js"></script>
</body>
</html>
