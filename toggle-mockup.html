<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toggle in Select</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    background: #f5f5f7;
    padding: 40px 32px;
    color: #111;
  }
  h3 {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #8e8e93;
    margin-bottom: 16px;
  }
  .section { margin-bottom: 44px; }
  .card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 22px 24px;
    display: inline-block;
  }
  .row3 { display: grid; grid-template-columns: 200px 200px 220px; gap: 16px; align-items: end; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field > label {
    font-size: 11px; font-weight: 500; color: #6b7280;
    display: block;
  }
  .plain-input {
    height: 36px; padding: 0 12px;
    border: 1px solid #d1d5db; border-radius: 8px;
    font-size: 12px; font-family: inherit; color: #9ca3af;
    background: #fff; outline: none; width: 100%;
  }

  /* ═══════════════════════════════════════════
     OPTION A — pill toggle a sinistra
     ═══════════════════════════════════════════ */
  .field-a {
    height: 36px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    background: #fff;
    display: flex;
    align-items: center;
    padding: 0 12px 0 4px;
    gap: 8px;
    transition: border-color .15s;
  }
  .field-a:focus-within { border-color: #ED005E; }
  .field-a input {
    flex: 1; min-width: 0;
    border: none; outline: none;
    font-size: 12px; font-family: inherit; color: #111;
    background: transparent;
  }
  .field-a input::placeholder { color: #9ca3af; }
  .toggle-pill {
    display: inline-flex;
    background: #f3f4f6;
    border-radius: 5px;
    padding: 2px;
    gap: 1px;
    flex-shrink: 0;
    order: -1;
  }
  .toggle-pill button {
    height: 20px; padding: 0 7px;
    border: none; border-radius: 3px;
    font-size: 10px; font-weight: 500;
    cursor: pointer; font-family: inherit;
    color: #9ca3af; background: transparent;
    transition: background .12s, color .12s;
    white-space: nowrap;
  }
  .toggle-pill button.act {
    background: #fff;
    color: #ED005E;
    font-weight: 600;
    box-shadow: 0 1px 2px rgba(0,0,0,.1);
  }

  /* ═══════════════════════════════════════════
     OPTION B — segmento incollato al bordo sinistro
     ═══════════════════════════════════════════ */
  .field-b {
    height: 36px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    background: #fff;
    display: flex;
    align-items: center;
    overflow: hidden;
    transition: border-color .15s;
  }
  .field-b:focus-within { border-color: #ED005E; }
  .field-b input {
    flex: 1; min-width: 0;
    border: none; outline: none;
    font-size: 12px; font-family: inherit; color: #111;
    background: transparent;
    padding: 0 10px;
  }
  .field-b input::placeholder { color: #9ca3af; }
  .field-b-toggle {
    display: flex;
    align-items: stretch;
    height: 100%;
    border-right: 1px solid #e5e7eb;
    flex-shrink: 0;
    order: -1;
  }
  .field-b-toggle button {
    width: 32px;
    border: none;
    background: transparent;
    font-size: 10px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    color: #9ca3af;
    transition: background .12s, color .12s;
  }
  .field-b-toggle button.act {
    background: #fdf2f7;
    color: #ED005E;
  }
  .field-b-toggle .divider-v {
    width: 1px; background: #e5e7eb; flex-shrink: 0;
    align-self: center; height: 16px;
  }

  /* ═══════════════════════════════════════════
     OPTION C — chip badge a sinistra
     ═══════════════════════════════════════════ */
  .field-c {
    height: 36px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    background: #fff;
    display: flex;
    align-items: center;
    padding: 0 12px 0 8px;
    gap: 8px;
    transition: border-color .15s;
  }
  .field-c:focus-within { border-color: #ED005E; }
  .field-c input {
    flex: 1; min-width: 0;
    border: none; outline: none;
    font-size: 12px; font-family: inherit; color: #111;
    background: transparent;
  }
  .field-c input::placeholder { color: #9ca3af; }
  .mode-chip {
    height: 20px; padding: 0 8px;
    border-radius: 99px;
    border: 1px solid #ED005E;
    background: #fdf2f7;
    font-size: 10px; font-weight: 600;
    color: #ED005E;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    flex-shrink: 0;
    display: flex; align-items: center; gap: 3px;
    order: -1;
    transition: background .12s;
  }
  .mode-chip:hover { background: #fce7f3; }
  .mode-chip svg { width: 8px; height: 8px; }
</style>
</head>
<body>

<!-- ───── OPTION A ───── -->
<div class="section">
  <h3>Option A — Pill Name / ID dentro il campo</h3>
  <div class="card">
    <div class="row3">
      <div class="field">
        <label>Client</label>
        <input class="plain-input" type="text" placeholder="Select client…">
      </div>
      <div class="field">
        <label>Advertiser</label>
        <input class="plain-input" type="text" placeholder="Select advertiser…">
      </div>
      <div class="field">
        <label>Campaign</label>
        <div class="field-a">
          <input id="ia" type="text" placeholder="Campaign name…">
          <div class="toggle-pill">
            <button class="act" onclick="switchA(this,'Name')">Name</button>
            <button onclick="switchA(this,'ID')">ID</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ───── OPTION B ───── -->
<div class="section">
  <h3>Option B — Segmento Name / ID incollato al bordo destro</h3>
  <div class="card">
    <div class="row3">
      <div class="field">
        <label>Client</label>
        <input class="plain-input" type="text" placeholder="Select client…">
      </div>
      <div class="field">
        <label>Advertiser</label>
        <input class="plain-input" type="text" placeholder="Select advertiser…">
      </div>
      <div class="field">
        <label>Campaign</label>
        <div class="field-b">
          <input id="ib" type="text" placeholder="Campaign name…">
          <div class="field-b-toggle">
            <button class="act" onclick="switchB(this,'Name')">N</button>
            <div class="divider-v"></div>
            <button onclick="switchB(this,'ID')">ID</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ───── OPTION C ───── -->
<div class="section">
  <h3>Option C — Chip cliccabile che mostra la modalità attiva</h3>
  <div class="card">
    <div class="row3">
      <div class="field">
        <label>Client</label>
        <input class="plain-input" type="text" placeholder="Select client…">
      </div>
      <div class="field">
        <label>Advertiser</label>
        <input class="plain-input" type="text" placeholder="Select advertiser…">
      </div>
      <div class="field">
        <label>Campaign</label>
        <div class="field-c">
          <input id="ic" type="text" placeholder="Campaign name…">
          <button class="mode-chip" id="chipC" onclick="switchC()">
            Name
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="m7 10 5-5 5 5M7 14l5 5 5-5"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// A
function switchA(btn, mode) {
  btn.closest('.toggle-pill').querySelectorAll('button').forEach(b => b.classList.remove('act'));
  btn.classList.add('act');
  var inp = document.getElementById('ia');
  inp.placeholder = mode === 'Name' ? 'Campaign name…' : 'e.g. CAMP-2024-001';
  inp.focus();
}
// B
function switchB(btn, mode) {
  btn.closest('.field-b-toggle').querySelectorAll('button').forEach(b => b.classList.remove('act'));
  btn.classList.add('act');
  var inp = document.getElementById('ib');
  inp.placeholder = mode === 'Name' ? 'Campaign name…' : 'e.g. CAMP-2024-001';
  inp.focus();
}
// C
var cMode = 'Name';
function switchC() {
  cMode = cMode === 'Name' ? 'ID' : 'Name';
  var chip = document.getElementById('chipC');
  var inp  = document.getElementById('ic');
  chip.childNodes[0].textContent = cMode + ' ';
  inp.placeholder = cMode === 'Name' ? 'Campaign name…' : 'e.g. CAMP-2024-001';
  inp.focus();
}
</script>
</body>
</html>
